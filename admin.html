<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="./logo.png" />
  <title>Bahçeşehir Üniversitesi Derslikleri - Yönetim Paneli</title>
  <style>
    :root{
      --bg:#f5f7fb; --surface:#fff; --surface-soft:#f8fafc; --muted:#667085; --text:#101828;
      --border:#e4e7ec; --primary:#2f6fed; --danger:#f04438; --success:#12b76a; --shadow:0 10px 30px rgba(16,24,40,.06);
    }
    *{box-sizing:border-box} body{margin:0;font-family:Inter,Arial,sans-serif;background:var(--bg);color:var(--text)}
    .container{width:min(1220px,calc(100% - 32px));margin:0 auto}
    .topbar{background:#fff;border-bottom:1px solid var(--border)}
    .topbar-inner{height:74px;display:flex;align-items:center;justify-content:space-between;gap:12px}
    .brand{display:flex;align-items:center;gap:12px}.brand-logo{width:44px;height:44px;object-fit:contain;display:block}.brand-badge{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#2f6fed,#1d4ed8);color:#fff;display:grid;place-items:center;box-shadow:0 10px 20px rgba(47,111,237,.25)}
    .brand h1{margin:0;font-size:28px;font-weight:800}.brand p{margin:2px 0 0;color:var(--muted);font-size:14px}
    .nav a{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border:1px solid var(--border);border-radius:14px;background:#fff;color:#344054;text-decoration:none;font-size:14px;font-weight:600}
    .header{padding:28px 0 16px}.header h2{margin:0 0 16px;font-size:32px;letter-spacing:-.03em}
    .tabs{display:flex;gap:10px;flex-wrap:wrap}
    .tab-btn{padding:10px 16px;border:1px solid var(--border);border-radius:14px;background:#fff;color:#667085;font-weight:700;cursor:pointer}
    .tab-btn.active{background:#f9fafb;color:#101828;box-shadow:var(--shadow)}
    .toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:28px 0 16px}
    .toolbar-left{color:#475467;font-size:15px;font-weight:600}
    .toolbar-right{display:flex;gap:10px;align-items:center}
    .search{width:min(420px,100%);height:48px;border:1px solid var(--border);border-radius:14px;padding:0 14px;font-size:15px;background:#fff}
    .btn{border:none;border-radius:14px;padding:12px 16px;font-size:14px;font-weight:700;cursor:pointer}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-danger{background:#fee4e2;color:#b42318}
    .btn-secondary{background:#eff4ff;color:#175cd3}
    .btn-ghost{background:#fff;border:1px solid var(--border);color:#344054}
    .panel{display:none}.panel.active{display:block}
    .list{display:grid;gap:14px}
    .item{background:#fff;border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:space-between;gap:16px;overflow:hidden}
    .item-left{display:flex;align-items:center;gap:16px;min-width:0;flex:1}
    .thumb{width:112px;height:82px;background:#eef2f6;object-fit:cover;display:block;flex:0 0 auto}
    .thumb.placeholder{display:grid;place-items:center;color:#98a2b3;font-size:28px;font-weight:700}
    .item-body{padding:18px 0;min-width:0}
    .item-title{margin:0 0 6px;font-size:18px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .item-meta{color:#667085;font-size:14px;line-height:1.5}
    .item-actions{display:flex;gap:10px;padding:0 18px 0 0}
    .icon-btn{width:36px;height:36px;border:none;border-radius:10px;background:#fff;cursor:pointer;font-size:18px}
    .icon-btn.edit{color:#101828}.icon-btn.delete{color:#f04438}
    .empty{padding:28px;text-align:center;background:#fff;border:1px dashed var(--border);border-radius:20px;color:#667085}
    .auth-wrap{max-width:430px;margin:40px auto}
    .card{background:#fff;border:1px solid var(--border);border-radius:22px;box-shadow:var(--shadow)}
    .card-header{padding:20px 22px;border-bottom:1px solid var(--border)}
    .card-body{padding:20px 22px}
    .field{margin-bottom:14px} label{display:block;margin-bottom:8px;font-size:13px;font-weight:700;color:#344054}
    input[type="text"],input[type="number"],input[type="email"],input[type="password"],select,textarea,input[type="file"]{width:100%;border:1px solid var(--border);border-radius:14px;background:#fff;padding:13px 14px;font-size:15px;outline:none}
    textarea{min-height:100px;resize:vertical}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .status{padding:12px 14px;border-radius:14px;font-size:14px;font-weight:600;margin-bottom:14px;display:none}
    .status.show{display:block}.status.error{background:#fee4e2;color:#b42318}.status.success{background:#dcfae6;color:#067647}
    .modal{position:fixed;inset:0;background:rgba(16,24,40,.55);display:none;align-items:center;justify-content:center;padding:20px;z-index:50}
    .modal.active{display:flex}
    .modal-box{width:min(740px,100%);max-height:90vh;overflow:auto;background:#fff;border-radius:24px;box-shadow:0 30px 80px rgba(0,0,0,.25)}
    .modal-header{padding:20px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px}
    .modal-title{margin:0;font-size:24px;font-weight:800}
    .close{width:40px;height:40px;border-radius:12px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:18px}
    .modal-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
    .hidden{display:none!important}
    .thumbs{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .thumbs .img-box{position:relative}
    .thumbs img{width:86px;height:66px;object-fit:cover;border-radius:10px;border:1px solid var(--border)}
    .thumbs button{position:absolute;top:-6px;right:-6px;width:22px;height:22px;border:none;border-radius:999px;background:#fee4e2;color:#b42318;font-weight:800;cursor:pointer}
    @media (max-width:860px){.grid2{grid-template-columns:1fr}.toolbar{flex-direction:column;align-items:stretch}.toolbar-right{flex-direction:column;align-items:stretch}.search{width:100%}.item{align-items:flex-start}.thumb{width:90px;height:72px}}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <div class="brand">
        <img class="brand-logo" src="./logo.png" alt="Bahçeşehir Üniversitesi logosu" />
        <div>
          <h1 id="brandTitle">Bahçeşehir Üniversitesi Derslikleri</h1>
          <p id="brandSubtitle">Derslik Görselleri</p>
        </div>
      </div>
      <nav class="nav" style="display:flex;gap:10px;align-items:center">
        <a href="./index.html">Ana Sayfa</a>
        <a href="./admin.html">Yönetim</a>
        <button id="logoutBtn" class="btn btn-ghost hidden">Çıkış Yap</button>
      </nav>
    </div>
  </header>

  <div class="container">
    <div id="authView" class="auth-wrap card">
      <div class="card-header">
        <h2 style="margin:0;font-size:28px;font-weight:800">Yönetim Girişi</h2>
        <p style="margin:6px 0 0;color:#667085">Firebase Authentication ile giriş yapın.</p>
      </div>
      <div class="card-body">
        <div id="authStatus" class="status"></div>
        <div class="field">
          <label>E-posta</label>
          <input id="loginEmail" type="email" placeholder="admin@site.com" />
        </div>
        <div class="field">
          <label>Şifre</label>
          <input id="loginPassword" type="password" placeholder="Şifreniz" />
        </div>
        <button id="loginBtn" class="btn btn-primary">Giriş Yap</button>
      </div>
    </div>

    <div id="appView" class="hidden">
      <section class="header">
        <h2>Yönetim Paneli</h2>
        <div class="tabs">
          <button class="tab-btn active" data-tab="campuses">Kampüsler</button>
          <button class="tab-btn" data-tab="blocks">Bloklar</button>
          <button class="tab-btn" data-tab="classrooms">Sınıflar</button>
          <button class="tab-btn" data-tab="types">Derslik Türleri</button>
          <button class="tab-btn" data-tab="settings">Ayarlar</button>
        </div>
      </section>

      <section id="campusesPanel" class="panel active">
        <div class="toolbar">
          <div class="toolbar-left"><span id="campusCount">0</span> kampüs</div>
          <div class="toolbar-right">
            <button id="newCampusBtn" class="btn btn-primary">＋ Yeni Kampüs</button>
          </div>
        </div>
        <div id="campusList" class="list"></div>
      </section>

      <section id="blocksPanel" class="panel">
        <div class="toolbar">
          <div class="toolbar-left"><span id="blockCount">0</span> blok</div>
          <div class="toolbar-right">
            <button id="newBlockBtn" class="btn btn-primary">＋ Yeni Blok</button>
          </div>
        </div>
        <div id="blockList" class="list"></div>
      </section>

      <section id="classroomsPanel" class="panel">
        <div class="toolbar">
          <div class="toolbar-left"><span id="classroomCount">0</span> sınıf</div>
          <div class="toolbar-right">
            <input id="classroomSearch" class="search" type="text" placeholder="Sınıf adı, blok veya kat ile ara..." />
            <button id="activateAllBtn" class="btn btn-secondary" title="Tüm sınıfları aktif hale getirir">✔ Tümünü Aktif Et</button>
            <button id="newClassroomBtn" class="btn btn-primary" style="width: -webkit-fill-available;">＋ Yeni Sınıf</button>
          </div>
        </div>
        <div id="classroomList" class="list"></div>
      </section>

      <section id="typesPanel" class="panel">
        <div class="toolbar">
          <div class="toolbar-left"><span id="typeCount">0</span> derslik türü</div>
        </div>

        <div class="card">
          <div class="card-body">
            <div class="field">
              <label>Derslik Türleri</label>
              <div class="grid2">
                <input id="newTypeName" type="text" placeholder="Örn: Amfi" />
                <button id="addTypeBtn" class="btn btn-secondary" type="button">Tür Ekle</button>
              </div>
              <div id="typeStatus" class="status"></div>
              <div id="typeList" class="list" style="margin-top:12px"></div>
            </div>
          </div>
        </div>
      </section>

      <section id="settingsPanel" class="panel">
        <div class="toolbar">
          <div class="toolbar-left">Site ayarları</div>
        </div>
        <div class="card">
          <div class="card-body">
            <div id="settingsStatus" class="status"></div>
            <div class="grid2">
              <div class="field">
                <label>Site Başlığı</label>
                <input id="settingTitle" type="text" placeholder="Bahçeşehir Üniversitesi Derslikleri" />
              </div>
              <div class="field">
                <label>Alt Başlık</label>
                <input id="settingSubtitle" type="text" placeholder="Derslik Görselleri" />
              </div>
            </div>
            <div class="field">
              <label>Logo / Kapak Görseli</label>
              <input id="settingLogo" type="file" accept="image/*" />
            </div>
            <div id="settingLogoPreview" class="thumbs"></div>

            <button id="saveSettingsBtn" class="btn btn-primary">Ayarları Kaydet</button>
          </div>
        </div>
      </section>
    </div>
  </div>

  <div id="entityModal" class="modal">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="modalTitle" class="modal-title">Yeni Kayıt</h3>
        <button id="closeModal" class="close">✕</button>
      </div>
      <div class="card-body">
        <div id="modalStatus" class="status"></div>

        <div id="campusForm" class="hidden">
          <div class="field">
            <label>Kampüs Adı</label>
            <input id="campusName" type="text" placeholder="İSTANBUL-BEŞİKTAŞ" />
          </div>
          <div class="field">
            <label>Kapak Görseli</label>
            <input id="campusImage" type="file" accept="image/*" />
          </div>
          <div id="campusImagePreview" class="thumbs"></div>
        </div>

        <div id="blockForm" class="hidden">
          <div class="grid2">
            <div class="field">
              <label>Blok Adı</label>
              <input id="blockName" type="text" placeholder="B Blok (Beşiktaş)" />
            </div>
            <div class="field">
              <label>Bağlı Kampüs</label>
              <select id="blockCampusId"></select>
            </div>
          </div>
          <div class="grid2">
            <div class="field">
              <label>Kat Sayısı</label>
              <input id="blockFloorCount" type="number" min="0" placeholder="10" />
            </div>
            <div class="field">
              <label>Kapak Görseli</label>
              <input id="blockImage" type="file" accept="image/*" />
            </div>
          </div>
          <div id="blockImagePreview" class="thumbs"></div>
        </div>

        <div id="classroomForm" class="hidden">
          <div class="grid2">
            <div class="field">
              <label>Sınıf Kodu</label>
              <input id="classroomCode" type="text" placeholder="B201" />
            </div>
            <div class="field">
              <label>Kapasite</label>
              <input id="classroomCapacity" type="number" min="0" placeholder="152" />
            </div>
          </div>
          <div class="grid2">
            <div class="field">
              <label>Kampüs</label>
              <select id="classroomCampusId"></select>
            </div>
            <div class="field">
              <label>Blok</label>
              <select id="classroomBlockId"></select>
            </div>
          </div>
          <div class="grid2">
            <div class="field">
              <label>Kat</label>
              <input id="classroomFloor" type="text" placeholder="2.Kat" />
            </div>
            <div class="field">
              <label>Tür</label>
              <select id="classroomType"></select>
            </div>
          </div>
          <div class="field">
            <label><input id="classroomActive" type="checkbox" checked /> Aktif mi?</label>
          </div>
          <div class="field">
            <label>Özellikler</label>
            <input id="classroomFeatures" type="text" placeholder="Projeksiyon, Klima, Akıllı Tahta" />
          </div>
          <div class="field">
            <label>Görseller</label>
            <input id="classroomImages" type="file" accept="image/*" multiple />
          </div>
          <div id="classroomImagePreview" class="thumbs"></div>
        </div>

        <div class="modal-actions">
          <button id="saveEntityBtn" class="btn btn-primary">Kaydet</button>
          <button id="deleteEntityBtn" class="btn btn-danger hidden">Sil</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { db, auth, storage } from './firebase-config.js';
    import {
      collection, getDocs, getDoc, query, orderBy, addDoc, updateDoc, deleteDoc,
      doc, serverTimestamp, setDoc, writeBatch
    } from 'https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js';
    import {
      signInWithEmailAndPassword, onAuthStateChanged, signOut
    } from 'https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js';
    import {
      ref, uploadBytes, getDownloadURL, deleteObject
    } from 'https://www.gstatic.com/firebasejs/10.12.4/firebase-storage.js';

    const $ = id => document.getElementById(id);

    let campuses = [];
    let blocks = [];
    let classrooms = [];
    let classroomTypes = [];
    let settings = {};
    let currentTab = 'campuses';
    let modalType = null;
    let editingId = null;
    let currentImageObject = null;
    let currentImages = [];

    function showStatus(el, text, type='success') {
      el.textContent = text;
      el.className = `status show ${type}`;
    }
    function clearStatus(el) {
      el.textContent = '';
      el.className = 'status';
    }
    function escapeHtml(str='') {
      return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    }

    function setActiveTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tab));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      $(tab + 'Panel').classList.add('active');
    }

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => setActiveTab(btn.dataset.tab));
    });

    async function uploadFile(path, file) {
      const storageRef = ref(storage, path);
      await uploadBytes(storageRef, file);
      const url = await getDownloadURL(storageRef);
      return { url, path };
    }

    async function deleteImageIfPossible(obj) {
      if (obj && obj.path) {
        try { await deleteObject(ref(storage, obj.path)); } catch(e) {}
      }
    }

    function previewSingle(targetId, obj) {
      const wrap = $(targetId);
      wrap.innerHTML = obj ? `<div class="img-box"><img src="${obj.url}" alt=""></div>` : '';
    }

    function previewMultiple(targetId, list) {
      const wrap = $(targetId);
      wrap.innerHTML = list.map((img, i) => `
        <div class="img-box">
          <img src="${img.url}" alt="">
          <button type="button" data-i="${i}">×</button>
        </div>
      `).join('');
      wrap.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => {
          currentImages.splice(Number(btn.dataset.i), 1);
          previewMultiple(targetId, currentImages);
        });
      });
    }

    function resetModal() {
      editingId = null;
      currentImageObject = null;
      currentImages = [];
      clearStatus($('modalStatus'));
      $('deleteEntityBtn').classList.add('hidden');
      ['campusForm','blockForm','classroomForm'].forEach(id => $(id).classList.add('hidden'));
      ['campusImagePreview','blockImagePreview','classroomImagePreview'].forEach(id => $(id).innerHTML = '');
      ['campusName','blockName','blockFloorCount','classroomCode','classroomCapacity','classroomFloor','classroomType','classroomFeatures'].forEach(id => { if ($(id)) $(id).value = ''; });
      ['campusImage','blockImage','classroomImages'].forEach(id => { if ($(id)) $(id).value = ''; });
    }

    function openModal(type, data=null) {
      resetModal();
      modalType = type;
      $('entityModal').classList.add('active');
      $('deleteEntityBtn').classList.toggle('hidden', !data);

      if (type === 'campus') {
        $('modalTitle').textContent = data ? 'Kampüs Düzenle' : 'Yeni Kampüs';
        $('campusForm').classList.remove('hidden');
        if (data) {
          editingId = data.id;
          $('campusName').value = data.name || '';
          currentImageObject = data.imageObject || (data.imageUrl ? { url: data.imageUrl } : null);
          previewSingle('campusImagePreview', currentImageObject);
        }
      }

      if (type === 'block') {
        fillCampusSelect('blockCampusId');
        $('modalTitle').textContent = data ? 'Blok Düzenle' : 'Yeni Blok';
        $('blockForm').classList.remove('hidden');
        if (data) {
          editingId = data.id;
          $('blockName').value = data.name || '';
          $('blockCampusId').value = data.campusId || '';
          $('blockFloorCount').value = data.floorCount || 0;
          currentImageObject = data.imageObject || (data.imageUrl ? { url: data.imageUrl } : null);
          previewSingle('blockImagePreview', currentImageObject);
        }
      }

      if (type === 'classroom') {
        fillCampusSelect('classroomCampusId');
        fillBlockSelect('classroomBlockId', data?.campusId || $('classroomCampusId').value);
        fillClassroomTypeSelect(data?.type || '');
        $('modalTitle').textContent = data ? 'Sınıf Düzenle' : 'Yeni Sınıf';
        $('classroomForm').classList.remove('hidden');
        if (data) {
          editingId = data.id;
          $('classroomCode').value = data.code || '';
          $('classroomCapacity').value = data.capacity || 0;
          $('classroomCampusId').value = data.campusId || '';
          fillBlockSelect('classroomBlockId', data.campusId);
          $('classroomBlockId').value = data.blockId || '';
          $('classroomFloor').value = data.floor || '';
          $('classroomType').value = data.type || '';
          $('classroomFeatures').value = (data.features || []).join(', ');
           $('classroomActive').checked = data.active !== false;
          currentImages = Array.isArray(data.imageObjects) ? [...data.imageObjects] : Array.isArray(data.images) ? data.images.map(url => ({ url })) : [];
          previewMultiple('classroomImagePreview', currentImages);
        }
      }
    }

    function closeModal() {
      $('entityModal').classList.remove('active');
    }

    $('closeModal').addEventListener('click', closeModal);
    $('entityModal').addEventListener('click', e => { if (e.target === $('entityModal')) closeModal(); });

    function fillCampusSelect(selectId) {
      $(selectId).innerHTML = campuses.map(c => `<option value="${c.id}">${escapeHtml(c.name || '')}</option>`).join('');
    }

    function fillBlockSelect(selectId, campusId) {
      const filtered = blocks.filter(b => !campusId || b.campusId === campusId);
      $(selectId).innerHTML = filtered.map(b => `<option value="${b.id}">${escapeHtml(b.name || '')}</option>`).join('');
    }

    $('classroomCampusId').addEventListener('change', () => fillBlockSelect('classroomBlockId', $('classroomCampusId').value));

    $('campusImage').addEventListener('change', async e => {
      const file = e.target.files?.[0];
      if (file) {
        currentImageObject = { url: URL.createObjectURL(file), file };
        previewSingle('campusImagePreview', currentImageObject);
      }
    });

    $('blockImage').addEventListener('change', async e => {
      const file = e.target.files?.[0];
      if (file) {
        currentImageObject = { url: URL.createObjectURL(file), file };
        previewSingle('blockImagePreview', currentImageObject);
      }
    });

    $('classroomImages').addEventListener('change', e => {
      const files = Array.from(e.target.files || []);
      for (const file of files) currentImages.push({ url: URL.createObjectURL(file), file });
      previewMultiple('classroomImagePreview', currentImages);
    });

    async function loadAll() {
      const [campusSnap, blockSnap, classroomSnap, typeSnap] = await Promise.all([
        getDocs(query(collection(db, 'campuses'), orderBy('name'))),
        getDocs(query(collection(db, 'blocks'), orderBy('name'))),
        getDocs(query(collection(db, 'classrooms'), orderBy('code'))),
        getDocs(query(collection(db, 'classroomTypes'), orderBy('name')))
      ]);
      campuses = campusSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      blocks = blockSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      classrooms = classroomSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      classroomTypes = typeSnap.docs.map(d => ({ id: d.id, ...d.data() }));

      try {
        const setSnap = await getDoc(doc(db, 'settings', 'site'));
        settings = setSnap.exists() ? setSnap.data() : {};
      } catch (e) { settings = {}; }

      renderCounts();
      renderCampuses();
      renderBlocks();
      renderClassrooms();
      renderTypeList();
      fillSettings();
      fillClassroomTypeSelect();
      $('brandTitle').textContent = settings.title || 'Bahçeşehir Üniversitesi Derslikleri';
      $('brandSubtitle').textContent = settings.subtitle || 'Derslik Görselleri';
    }

    function renderCounts() {
      $('campusCount').textContent = campuses.length;
      $('blockCount').textContent = blocks.length;
      $('classroomCount').textContent = classrooms.filter(c => c.active !== false).length;
      $('typeCount').textContent = classroomTypes.length;
    }

    function campusBlockCount(campusId) {
      return blocks.filter(b => b.campusId === campusId).length;
    }

    function blockClassCount(blockId) {
      return classrooms.filter(c => c.blockId === blockId).length;
    }

    function renderCampuses() {
      const list = $('campusList');
      if (!campuses.length) {
        list.innerHTML = `<div class="empty">Henüz kampüs eklenmemiş.</div>`;
        return;
      }
      list.innerHTML = campuses.map(c => `
        <article class="item">
          <div class="item-left">
            ${c.imageUrl ? `<img class="thumb" src="${c.imageUrl}" alt="">` : `<div class="thumb placeholder">🏫</div>`}
            <div class="item-body">
              <h3 class="item-title">${escapeHtml(c.name || '')}</h3>
              <div class="item-meta">${campusBlockCount(c.id)} blok</div>
            </div>
          </div>
          <div class="item-actions">
            <button class="icon-btn edit" data-type="campus" data-id="${c.id}">✎</button>
            <button class="icon-btn delete" data-del-type="campus" data-id="${c.id}">🗑</button>
          </div>
        </article>
      `).join('');
      wireListActions();
    }

    function renderBlocks() {
      const list = $('blockList');
      if (!blocks.length) {
        list.innerHTML = `<div class="empty">Henüz blok eklenmemiş.</div>`;
        return;
      }
      list.innerHTML = blocks.map(b => `
        <article class="item">
          <div class="item-left">
            ${b.imageUrl ? `<img class="thumb" src="${b.imageUrl}" alt="">` : `<div class="thumb placeholder">🏢</div>`}
            <div class="item-body">
              <h3 class="item-title">${escapeHtml(b.name || '')}</h3>
              <div class="item-meta">${escapeHtml(b.campusName || '-')} • ${blockClassCount(b.id)} sınıf • ${Number(b.floorCount || 0)} kat</div>
            </div>
          </div>
          <div class="item-actions">
            <button class="icon-btn edit" data-type="block" data-id="${b.id}">✎</button>
            <button class="icon-btn delete" data-del-type="block" data-id="${b.id}">🗑</button>
          </div>
        </article>
      `).join('');
      wireListActions();
    }

    function renderClassrooms() {
        const q = $('classroomSearch').value.trim().toLowerCase();
        // Aktiflik filtresi: sadece aktif olanlar gösterilsin
        const filtered = classrooms.filter(c => {
          const text = `${c.code || ''} ${c.blockName || ''} ${c.floor || ''} ${c.campusName || ''}`.toLowerCase();
          return text.includes(q);
        });

        const list = $('classroomList');
        if (!filtered.length) {
          list.innerHTML = `<div class="empty">Kayıt bulunamadı.</div>`;
          return;
        }
        list.innerHTML = filtered.map(c => `
          <article class="item" style="${c.active === false ? 'opacity:0.7;border-left:4px solid #f04438' : ''}">
            <div class="item-left">
              ${c.images?.[0] ? `<img class="thumb" src="${c.images[0]}" alt="">` : `<div class="thumb placeholder">🪑</div>`}
              <div class="item-body">
                <h3 class="item-title">${escapeHtml(c.code || '')}${c.active === false ? ' <span style="font-size:13px;font-weight:700;background:#fee4e2;color:#b42318;padding:2px 8px;border-radius:6px;margin-left:6px">Pasif</span>' : ''}</h3>
                <div class="item-meta">${escapeHtml(c.blockName || '-')} • ${escapeHtml(c.floor || '-')} • ${Number(c.capacity || 0)} kişi</div>
              </div>
            </div>
            <div class="item-actions">
              <button class="icon-btn edit" data-type="classroom" data-id="${c.id}">✎</button>
              <button class="icon-btn delete" data-del-type="classroom" data-id="${c.id}">🗑</button>
            </div>
          </article>
        `).join('');
        wireListActions();
      }

    function wireListActions() {
      document.querySelectorAll('[data-type]').forEach(btn => {
        btn.onclick = () => {
          const type = btn.dataset.type;
          const id = btn.dataset.id;
          if (type === 'campus') openModal('campus', campuses.find(x => x.id === id));
          if (type === 'block') openModal('block', blocks.find(x => x.id === id));
          if (type === 'classroom') openModal('classroom', classrooms.find(x => x.id === id));
        };
      });
      document.querySelectorAll('[data-del-type]').forEach(btn => {
        btn.onclick = () => handleDelete(btn.dataset.delType, btn.dataset.id);
      });
    }

    async function handleDelete(type, id) {
      if (type === 'campus') {
        if (blocks.some(b => b.campusId === id)) { alert('Önce bu kampüse bağlı blokları silin.'); return; }
        const item = campuses.find(x => x.id === id);
        if (!confirm('Kampüs silinsin mi?')) return;
        await deleteImageIfPossible(item.imageObject);
        await deleteDoc(doc(db, 'campuses', id));
      }
      if (type === 'block') {
        if (classrooms.some(c => c.blockId === id)) { alert('Önce bu bloğa bağlı sınıfları silin.'); return; }
        const item = blocks.find(x => x.id === id);
        if (!confirm('Blok silinsin mi?')) return;
        await deleteImageIfPossible(item.imageObject);
        await deleteDoc(doc(db, 'blocks', id));
      }
      if (type === 'classroom') {
        const item = classrooms.find(x => x.id === id);
        if (!confirm('Sınıf silinsin mi?')) return;
        for (const img of (item.imageObjects || [])) await deleteImageIfPossible(img);
        await deleteDoc(doc(db, 'classrooms', id));
      }
      await loadAll();
    }

    async function saveCampus() {
      const name = $('campusName').value.trim();
      if (!name) return showStatus($('modalStatus'), 'Kampüs adı zorunlu.', 'error');

      let imageObject = currentImageObject && !currentImageObject.file ? currentImageObject : null;
      if (currentImageObject?.file) {
        imageObject = await uploadFile(`campuses/${Date.now()}-${currentImageObject.file.name}`, currentImageObject.file);
      }

      const payload = { name, imageUrl: imageObject?.url || '', imageObject, updatedAt: serverTimestamp() };
      if (editingId) {
        const old = campuses.find(x => x.id === editingId);
        if (currentImageObject?.file && old?.imageObject?.path) await deleteImageIfPossible(old.imageObject);
        await updateDoc(doc(db, 'campuses', editingId), payload);
      } else {
        payload.createdAt = serverTimestamp();
        await addDoc(collection(db, 'campuses'), payload);
      }
    }

    async function saveBlock() {
      const name = $('blockName').value.trim();
      const campusId = $('blockCampusId').value;
      const campus = campuses.find(c => c.id === campusId);
      if (!name || !campusId) return showStatus($('modalStatus'), 'Blok adı ve kampüs zorunlu.', 'error');

      let imageObject = currentImageObject && !currentImageObject.file ? currentImageObject : null;
      if (currentImageObject?.file) {
        imageObject = await uploadFile(`blocks/${Date.now()}-${currentImageObject.file.name}`, currentImageObject.file);
      }

      const payload = {
        name,
        campusId,
        campusName: campus?.name || '',
        floorCount: Number($('blockFloorCount').value || 0),
        imageUrl: imageObject?.url || '',
        imageObject,
        updatedAt: serverTimestamp()
      };

      if (editingId) {
        const old = blocks.find(x => x.id === editingId);
        if (currentImageObject?.file && old?.imageObject?.path) await deleteImageIfPossible(old.imageObject);
        await updateDoc(doc(db, 'blocks', editingId), payload);
      } else {
        payload.createdAt = serverTimestamp();
        await addDoc(collection(db, 'blocks'), payload);
      }
    }

    async function saveClassroom() {
      const code = $('classroomCode').value.trim();
      const campusId = $('classroomCampusId').value;
      const blockId = $('classroomBlockId').value;
      const campus = campuses.find(c => c.id === campusId);
      const block = blocks.find(b => b.id === blockId);
      if (!code || !campusId || !blockId) return showStatus($('modalStatus'), 'Sınıf kodu, kampüs ve blok zorunlu.', 'error');

      const saveBtn = $('saveEntityBtn');
      const oldText = saveBtn.textContent;
      saveBtn.disabled = true;
      saveBtn.textContent = 'Kaydediliyor...';
      showStatus($('modalStatus'), 'Kaydediliyor, lütfen bekleyin...');

      try {
        const uploaded = [];
        for (const img of currentImages) {
          if (img.file) {
            uploaded.push(await uploadFile(`classrooms/${code}/${Date.now()}-${img.file.name}`, img.file));
          } else {
            uploaded.push(img);
          }
        }

        const payload = {
          code,
          capacity: Number($('classroomCapacity').value || 0),
          campusId,
          campusName: campus?.name || '',
          blockId,
          blockName: block?.name || '',
          floor: $('classroomFloor').value.trim(),
          type: $('classroomType').value.trim(),
          features: $('classroomFeatures').value.split(',').map(x => x.trim()).filter(Boolean),
          images: uploaded.map(x => x.url),
          imageObjects: uploaded,
            active: $('classroomActive').checked,
          updatedAt: serverTimestamp()
        };

        if (editingId) {
          const old = classrooms.find(x => x.id === editingId);
          const keptPaths = new Set(uploaded.map(x => x.path).filter(Boolean));
          for (const img of (old.imageObjects || [])) {
            if (img.path && !keptPaths.has(img.path)) await deleteImageIfPossible(img);
          }
          await updateDoc(doc(db, 'classrooms', editingId), payload);
        } else {
          payload.createdAt = serverTimestamp();
          await addDoc(collection(db, 'classrooms'), payload);
        }
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = oldText;
      }
    }

    async function saveSettings() {
      clearStatus($('settingsStatus'));
      const title = $('settingTitle').value.trim();
      const subtitle = $('settingSubtitle').value.trim();
      let logoObject = settings.logoObject || null;
      const file = $('settingLogo').files?.[0];
      if (file) {
        if (logoObject?.path) await deleteImageIfPossible(logoObject);
        logoObject = await uploadFile(`settings/${Date.now()}-${file.name}`, file);
      }
      await setDoc(doc(db, 'settings', 'site'), {
        title, subtitle,
        logoUrl: logoObject?.url || '',
        logoObject: logoObject || null,
        updatedAt: serverTimestamp()
      }, { merge: true });
      showStatus($('settingsStatus'), 'Ayarlar kaydedildi.');
      await loadAll();
    }


    function fillClassroomTypeSelect(selectedValue = '') {
      const select = $('classroomType');
      const options = classroomTypes.length
        ? classroomTypes.map(t => `<option value="${escapeHtml(t.name || '')}">${escapeHtml(t.name || '')}</option>`).join('')
        : '';
      select.innerHTML = `<option value="">Tür seçin</option>${options}`;
      if (selectedValue) select.value = selectedValue;
    }

    function renderTypeList() {
      const list = $('typeList');
      if (!list) return;
      if (!classroomTypes.length) {
        list.innerHTML = '<div class="empty">Henüz derslik türü eklenmemiş.</div>';
        return;
      }
      list.innerHTML = classroomTypes.map(t => `
        <article class="item" style="min-height:auto">
          <div class="item-left">
            <div class="item-body" style="padding:16px 0">
              <h3 class="item-title" style="font-size:16px;margin:0">${escapeHtml(t.name || '')}</h3>
            </div>
          </div>
          <div class="item-actions">
            <button class="icon-btn delete" data-type-id="${t.id}" title="Sil">🗑</button>
          </div>
        </article>
      `).join('');

      list.querySelectorAll('[data-type-id]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.typeId;
          const item = classroomTypes.find(x => x.id === id);
          if (!item) return;
          const used = classrooms.some(c => (c.type || '') === (item.name || ''));
          if (used) {
            showStatus($('typeStatus'), 'Bu tür kullanıldığı için silinemez.', 'error');
            return;
          }
          if (!confirm('Derslik türü silinsin mi?')) return;
          await deleteDoc(doc(db, 'classroomTypes', id));
          await loadAll();
          showStatus($('typeStatus'), 'Derslik türü silindi.');
        });
      });
    }

    function fillSettings() {
      $('settingTitle').value = settings.title || 'Bahçeşehir Üniversitesi Derslikleri';
      $('settingSubtitle').value = settings.subtitle || 'Derslik Görselleri';
      $('settingLogoPreview').innerHTML = settings.logoUrl ? `<div class="img-box"><img src="${settings.logoUrl}" alt=""></div>` : '';
    }

    $('saveSettingsBtn').addEventListener('click', saveSettings);
    $('classroomSearch').addEventListener('input', renderClassrooms);

    $('activateAllBtn').addEventListener('click', async () => {
      if (!confirm('Tüm sınıflar aktif hale getirilsin mi?')) return;
      const btn = $('activateAllBtn');
      const oldText = btn.textContent;
      btn.disabled = true;
      btn.textContent = 'İşleniyor...';
      try {
        const inactiveClassrooms = classrooms.filter(c => c.active === false);
        if (!inactiveClassrooms.length) {
          alert('Zaten tüm sınıflar aktif durumda.');
          return;
        }
        // Firestore batch max 500 işlem — gerekirse böl
        const chunkSize = 500;
        for (let i = 0; i < inactiveClassrooms.length; i += chunkSize) {
          const batch = writeBatch(db);
          inactiveClassrooms.slice(i, i + chunkSize).forEach(c => {
            batch.update(doc(db, 'classrooms', c.id), { active: true });
          });
          await batch.commit();
        }
        await loadAll();
        alert(`${inactiveClassrooms.length} sınıf aktif hale getirildi.`);
      } catch (e) {
        console.error(e);
        alert('İşlem sırasında hata oluştu: ' + e.message);
      } finally {
        btn.disabled = false;
        btn.textContent = oldText;
      }
    });

    $('addTypeBtn').addEventListener('click', async () => {
      clearStatus($('typeStatus'));
      const name = $('newTypeName').value.trim();
      if (!name) return showStatus($('typeStatus'), 'Tür adı girin.', 'error');
      const exists = classroomTypes.some(t => (t.name || '').toLowerCase() === name.toLowerCase());
      if (exists) return showStatus($('typeStatus'), 'Bu tür zaten mevcut.', 'error');

      const btn = $('addTypeBtn');
      const oldText = btn.textContent;
      btn.disabled = true;
      btn.textContent = 'Ekleniyor...';

      try {
        await addDoc(collection(db, 'classroomTypes'), {
          name,
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });
        $('newTypeName').value = '';
        await loadAll();
        showStatus($('typeStatus'), 'Derslik türü eklendi.');
      } catch (e) {
        console.error(e);
        showStatus($('typeStatus'), 'Tür eklenemedi.', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = oldText;
      }
    });

    $('newCampusBtn').addEventListener('click', () => openModal('campus'));
    $('newBlockBtn').addEventListener('click', () => openModal('block'));
    $('newClassroomBtn').addEventListener('click', () => openModal('classroom'));

    $('saveEntityBtn').addEventListener('click', async () => {
      clearStatus($('modalStatus'));
      const btn = $('saveEntityBtn');
      const oldText = btn.textContent;

      try {
        if (modalType === 'campus' || modalType === 'block') {
          btn.disabled = true;
          btn.textContent = 'Kaydediliyor...';
          showStatus($('modalStatus'), 'Kaydediliyor, lütfen bekleyin...');
        }

        if (modalType === 'campus') await saveCampus();
        if (modalType === 'block') await saveBlock();
        if (modalType === 'classroom') await saveClassroom();

        closeModal();
        await loadAll();
      } catch (e) {
        console.error(e);
        showStatus($('modalStatus'), 'Kayıt sırasında hata oluştu. Firebase yapılandırmasını ve kuralları kontrol edin.', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = oldText;
      }
    });

    $('deleteEntityBtn').addEventListener('click', async () => {
      if (!editingId || !modalType) return;
      await handleDelete(modalType, editingId);
      closeModal();
    });

    $('loginBtn').addEventListener('click', async () => {
      clearStatus($('authStatus'));
      try {
        await signInWithEmailAndPassword(auth, $('loginEmail').value.trim(), $('loginPassword').value);
      } catch (e) {
        console.error(e);
        showStatus($('authStatus'), 'Giriş başarısız. E-posta/şifre veya Auth ayarlarını kontrol edin.', 'error');
      }
    });

    $('logoutBtn').addEventListener('click', () => signOut(auth));

    onAuthStateChanged(auth, async user => {
      if (user) {
        $('authView').classList.add('hidden');
        $('appView').classList.remove('hidden');
        $('logoutBtn').classList.remove('hidden');
        await loadAll();
      } else {
        $('authView').classList.remove('hidden');
        $('appView').classList.add('hidden');
        $('logoutBtn').classList.add('hidden');
      }
    });
  </script>
</body>
</html>
